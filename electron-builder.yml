appId: com.meeterz.app
productName: Meeterz
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!docs/*'
  - '!models/*'
  - '!tests/*'
  - '!scripts/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json,playwright.config.ts}'
asarUnpack:
  - resources/**
extraResources:
  - from: models/ggml-small.bin
    to: models/ggml-small.bin
  - from: models/ggml-silero-v5.1.2.bin
    to: models/ggml-silero-v5.1.2.bin
  - from: models/diarization
    to: models/diarization
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSMicrophoneUsageDescription: Meeterz records your microphone to transcribe in-person meetings.
    - NSAudioCaptureUsageDescription: Meeterz records system audio (e.g. Teams calls) to transcribe your meetings.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
